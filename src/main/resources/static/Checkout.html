<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Toko Sepatu - Checkout</title>
    <link rel="stylesheet" href="CSS/Mainpage.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                'brand-blue': '#4338CA',
                'brand-blue-hover': '#0044CC',
              }
            }
          }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet"/>
</head>
<body class="bg-gray-50 min-h-screen text-gray-900">

<div class="bg-brand-blue text-white text-[10px] sm:text-xs py-2.5 font-bold uppercase tracking-widest overflow-hidden relative w-full flex items-center justify-center min-h-[36px]">
    <div class="w-full text-center">
        Checkout aman, cepat, dan langsung sinkron ke database.
    </div>
</div>

<nav class="bg-white border-b border-gray-200 sticky top-0 z-40">
    <div class="max-w-[1400px] mx-auto px-4 md:px-8 flex items-center justify-between h-16 md:h-20">
        <a href="Mainpage.html" class="flex items-center gap-2">
            <svg width="40" height="30" viewBox="0 0 40 30" fill="black">
                <path d="M0 30L10 0H20L10 30H0ZM20 30L30 0H40L30 30H20Z"/>
            </svg>
        </a>

        <div class="hidden md:flex items-center gap-6 lg:gap-10 text-sm font-bold uppercase tracking-wide">
            <a href="Mainpage.html" class="hover:underline hover:text-brand-blue underline-offset-4 transition">Kembali Belanja</a>
            <a href="#" class="hover:underline hover:text-brand-blue underline-offset-4 transition">Checkout</a>
        </div>

        <div class="flex items-center gap-4 md:gap-6">
            <a href="Mainpage.html" class="inline-flex items-center rounded-full bg-gray-100 px-4 py-2 text-xs font-bold uppercase tracking-wide text-gray-800 transition hover:bg-gray-200">
                Kembali
            </a>

            <a id="loginNavLink" href="Login.html" class="inline-flex items-center rounded-full bg-brand-blue px-4 py-2 text-xs font-bold uppercase tracking-wide text-white transition hover:bg-brand-blue-hover shadow-sm">
                Login
            </a>

            <div id="userMenu" class="relative hidden">
                <button id="userMenuButton" type="button" class="inline-flex items-center gap-2 rounded-full border border-gray-200 bg-white px-2 py-1.5 shadow-sm transition hover:border-brand-blue">
                    <img id="userAvatar" src="" alt="Foto profil user" class="h-8 w-8 rounded-full object-cover border border-indigo-100" />
                    <span id="userName" class="hidden sm:inline text-xs font-bold uppercase tracking-wide text-gray-800 max-w-[120px] truncate"></span>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-gray-500">
                        <polyline points="6 9 12 15 18 9"></polyline>
                    </svg>
                </button>

                <div id="userDropdown" class="absolute right-0 mt-2 hidden w-64 rounded-xl border border-gray-200 bg-white p-4 shadow-xl z-50">
                    <div class="flex items-center gap-3 border-b border-gray-100 pb-3">
                        <img id="userDropdownAvatar" src="" alt="Foto profil user" class="h-12 w-12 rounded-full object-cover border border-indigo-100" />
                        <div class="min-w-0">
                            <p id="userDropdownName" class="text-sm font-bold text-gray-900 truncate"></p>
                            <p id="userRoleBadge" class="text-[11px] font-semibold uppercase tracking-wide text-brand-blue"></p>
                        </div>
                    </div>
                    <p id="userAddress" class="mt-3 text-xs leading-5 text-gray-500"></p>
                    <button type="button" onclick="logout('Login.html')" class="mt-4 w-full rounded-lg bg-gray-100 px-3 py-2 text-xs font-bold uppercase tracking-wide text-gray-700 transition hover:bg-gray-200">
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </div>
</nav>

<main class="max-w-[1400px] mx-auto px-4 md:px-8 py-8">
    <div class="grid grid-cols-1 lg:grid-cols-5 gap-6">
        <section class="lg:col-span-3 space-y-6">
            <div class="rounded-3xl border border-gray-200 bg-white p-6 shadow-sm">
                <div class="flex items-start justify-between gap-4">
                    <div>
                        <p class="text-[11px] font-bold uppercase tracking-[0.3em] text-brand-blue">Checkout</p>
                        <h1 class="mt-2 text-2xl font-black tracking-tight text-gray-900">Selesaikan pesananmu</h1>
                        <p class="mt-2 text-sm text-gray-500">Pilih metode pembayaran, cek ringkasan, lalu bayar.</p>
                    </div>
                    <div class="hidden sm:flex h-14 w-14 items-center justify-center rounded-2xl bg-brand-blue/10 text-brand-blue font-black">ID</div>
                </div>
            </div>

            <form id="checkoutForm" class="space-y-6">
                <div class="rounded-3xl border border-gray-200 bg-white p-6 shadow-sm">
                    <h2 class="text-lg font-bold text-gray-900">Metode Pembayaran</h2>
                    <div class="mt-4 grid grid-cols-1 md:grid-cols-2 gap-4">
                        <label class="cursor-pointer rounded-2xl border border-gray-200 p-4 transition hover:border-brand-blue has-[:checked]:border-brand-blue has-[:checked]:bg-brand-blue/5">
                            <input type="radio" name="paymentMethod" value="EWALLET" class="sr-only" checked>
                            <div class="flex items-center justify-between gap-4">
                                <div>
                                    <p class="font-bold text-gray-900">EWallet</p>
                                    <p class="text-xs text-gray-500">Saldo digital, pembayaran cepat.</p>
                                </div>
                                <span class="rounded-full bg-brand-blue/10 px-3 py-1 text-[11px] font-bold uppercase tracking-wide text-brand-blue">Populer</span>
                            </div>
                        </label>

                        <label class="cursor-pointer rounded-2xl border border-gray-200 p-4 transition hover:border-brand-blue has-[:checked]:border-brand-blue has-[:checked]:bg-brand-blue/5">
                            <input type="radio" name="paymentMethod" value="TRANSFER" class="sr-only">
                            <div class="flex items-center justify-between gap-4">
                                <div>
                                    <p class="font-bold text-gray-900">Transfer Bank</p>
                                    <p class="text-xs text-gray-500">Cocok kalau mau bayar manual.</p>
                                </div>
                                <span class="rounded-full bg-gray-100 px-3 py-1 text-[11px] font-bold uppercase tracking-wide text-gray-600">Manual</span>
                            </div>
                        </label>
                    </div>
                </div>

                <div class="rounded-3xl border border-gray-200 bg-white p-6 shadow-sm">
                    <div class="flex items-center justify-between gap-4">
                        <div>
                            <h2 class="text-lg font-bold text-gray-900">Daftar Barang</h2>
                            <p id="checkoutMeta" class="mt-1 text-sm text-gray-500">Memuat isi keranjang...</p>
                        </div>
                        <button type="button" onclick="window.location.href='Mainpage.html'" class="rounded-full border border-gray-200 px-4 py-2 text-xs font-bold uppercase tracking-wide text-gray-700 transition hover:border-brand-blue hover:text-brand-blue">
                            Tambah Lagi
                        </button>
                    </div>

                    <div id="checkoutItems" class="mt-5 space-y-4"></div>
                </div>
            </form>
        </section>

        <aside class="lg:col-span-2">
            <div class="sticky top-24 rounded-3xl border border-gray-200 bg-white p-6 shadow-sm">
                <div>
                    <p class="text-[11px] font-bold uppercase tracking-[0.3em] text-brand-blue">Ringkasan</p>
                    <h2 class="mt-2 text-xl font-black text-gray-900">Total pesanan</h2>
                </div>

                <div id="checkoutSummary" class="mt-5 space-y-4"></div>

                <div class="mt-6 border-t border-gray-200 pt-5">
                    <div class="flex items-center justify-between text-sm text-gray-500">
                        <span>Total item</span>
                        <span id="summaryItems" class="font-bold text-gray-900">0</span>
                    </div>
                    <div class="mt-3 flex items-center justify-between">
                        <span class="text-sm font-bold uppercase tracking-wide text-gray-600">Total Bayar</span>
                        <span id="summaryTotal" class="text-2xl font-black text-brand-blue">$0</span>
                    </div>
                    <button id="checkoutButton" type="submit" form="checkoutForm" class="mt-5 w-full rounded-2xl bg-brand-blue px-4 py-3 text-sm font-black uppercase tracking-wide text-white transition hover:bg-brand-blue-hover disabled:cursor-not-allowed disabled:bg-gray-300">
                        Bayar Sekarang
                    </button>
                    <p id="checkoutMessage" class="mt-3 text-sm text-gray-500"></p>
                </div>
            </div>
        </aside>
    </div>
</main>

<script src="JS/Auth.js?v=20260618-1"></script>
<script src="JS/Checkout.js?v=20260618-2"></script>
</body>
</html>
