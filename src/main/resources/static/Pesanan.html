<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sellora – Daftar Pesanan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="CSS/Pesanan.css">
    
    <!-- Panggil Auth -->
    <script src="JS/Auth.js?v=20260621-3"></script>
    <script>
        // Lindungi halaman khusus Admin
        guardAdminAccess("Login.html");
    </script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900 flex">

<!-- ============ SIDEBAR ============ -->
<aside class="sidebar w-64 min-h-screen flex-shrink-0 flex flex-col fixed top-0 left-0 h-full z-30 overflow-y-auto">
    <!-- Logo -->
    <div class="px-6 py-7 flex items-center gap-3">
        <div class="w-9 h-9 bg-white/20 rounded-xl flex items-center justify-center">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"/>
            </svg>
        </div>
        <span class="text-white font-extrabold text-xl tracking-tight">Sellora</span>
    </div>

    <!-- Nav -->
    <nav class="px-3 flex-1">
        <p class="px-3 text-[10px] font-bold text-white/40 uppercase tracking-widest mb-2">Menu</p>

        <a href="DashboardAdmin.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-white/70 hover:text-white hover:bg-white/10 text-sm font-medium mb-1 transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
            Dashboard
        </a>

        <a href="Mainpage.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-white/70 hover:text-white hover:bg-white/10 text-sm font-medium mb-1 transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
            Lihat Toko
        </a>

        <a href="Pesanan.html" class="nav-item-active flex items-center gap-3 px-3 py-2.5 rounded-xl text-white text-sm font-semibold mb-1 transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
            Pesanan
        </a>
    </nav>

    <!-- User Profile -->
    <div class="px-4 py-5 border-t border-white/10">
        <div class="flex items-center gap-3">
            <img id="adminAvatar" src="https://ui-avatars.com/api/?name=Admin&background=6366f1&color=fff" alt="Foto profil admin" class="w-9 h-9 rounded-full object-cover ring-2 ring-white/30" />
            <div class="min-w-0">
                <p id="adminName" class="text-white text-sm font-semibold truncate">Admin</p>
                <p id="adminRole" class="text-indigo-300 text-[11px] font-medium">Administrator</p>
            </div>
        </div>
        <button onclick="logout('Login.html')" class="mt-3 w-full flex items-center justify-center gap-2 text-xs font-semibold text-white/70 hover:text-white bg-white/10 hover:bg-white/20 py-2 rounded-lg transition">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
            Logout
        </button>
    </div>
</aside>

<!-- ============ MAIN CONTENT ============ -->
<div class="ml-64 flex-1 min-h-screen flex flex-col">

    <!-- Top Bar -->
    <header class="sticky top-0 z-20 bg-white/80 backdrop-blur border-b border-slate-200 px-8 py-4 flex items-center justify-between">
        <div>
            <h1 class="text-lg font-bold text-slate-900">Kelola Pesanan</h1>
            <p class="text-xs text-slate-400" id="currentDateLabel">Pantau dan kelola pesanan pengguna</p>
        </div>
        <button onclick="fetchOrders()" class="flex items-center gap-2 bg-white hover:bg-slate-50 text-slate-600 border border-slate-200 text-sm font-medium px-4 py-2 rounded-xl shadow-sm transition">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
            Segarkan
        </button>
    </header>

    <main class="flex-1 px-8 py-8">
        
        <!-- Table Section -->
        <div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
            <div class="px-6 py-5 border-b border-slate-100 flex items-center justify-between">
                <h2 class="text-base font-bold text-slate-800">Daftar Semua Pesanan</h2>
                <div class="flex items-center gap-2">
                    <!-- Placeholder untuk filter kalau butuh nanti -->
                </div>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50/50">
                            <th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider border-b border-slate-100">ID Order</th>
                            <th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider border-b border-slate-100">Pemesan</th>
                            <th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider border-b border-slate-100">Tanggal</th>
                            <th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider border-b border-slate-100">Total Harga</th>
                            <th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider border-b border-slate-100">Status</th>
                            <th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider border-b border-slate-100 text-right">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="ordersTableBody" class="divide-y divide-slate-100">
                        <!-- Content will be generated by JS -->
                        <tr>
                            <td colspan="6" class="px-6 py-8 text-center text-sm text-slate-500">
                                Sedang memuat data pesanan...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>
</div>

<!-- ============ MODAL DETAIL PESANAN ============ -->
<div id="orderDetailModal" class="fixed inset-0 z-50 hidden">
    <!-- Backdrop -->
    <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm transition-opacity" onclick="closeDetailModal()"></div>
    
    <!-- Modal Panel -->
    <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-full max-w-2xl bg-white rounded-2xl shadow-2xl flex flex-col max-h-[90vh]">
        
        <!-- Header -->
        <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between bg-slate-50 rounded-t-2xl">
            <div>
                <h3 class="text-lg font-bold text-slate-800" id="modalTitle">Detail Pesanan</h3>
                <p class="text-xs text-slate-500 mt-1" id="modalSubtitle"></p>
            </div>
            <button onclick="closeDetailModal()" class="w-8 h-8 flex items-center justify-center rounded-full text-slate-400 hover:text-slate-600 hover:bg-slate-200 transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>

        <!-- Body / Items List -->
        <div class="p-6 overflow-y-auto flex-1">
            <h4 class="text-sm font-semibold text-slate-700 mb-3">Item yang Dipesan</h4>
            <div id="modalItemsContainer" class="space-y-3">
                <!-- Items injected via JS -->
            </div>
            
            <div class="mt-6 pt-4 border-t border-slate-100 flex justify-between items-center">
                <span class="text-sm font-semibold text-slate-500">Total Keseluruhan</span>
                <span class="text-lg font-bold text-indigo-600" id="modalTotalPrice">Rp 0</span>
            </div>
        </div>

        <!-- Footer / Status Update -->
        <div class="px-6 py-4 border-t border-slate-100 bg-slate-50 rounded-b-2xl flex items-center justify-between">
            <div class="flex items-center gap-3">
                <label for="statusSelect" class="text-sm font-medium text-slate-600">Ubah Status:</label>
                <select id="statusSelect" class="text-sm border border-slate-200 rounded-lg px-3 py-1.5 focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
                    <option value="Menunggu Konfirmasi">Menunggu Konfirmasi</option>
                    <option value="Diproses">Diproses</option>
                    <option value="Dikirim">Dikirim</option>
                    <option value="Selesai">Selesai</option>
                    <option value="Dibatalkan">Dibatalkan</option>
                </select>
            </div>
            <button onclick="saveOrderStatus()" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold px-5 py-2 rounded-xl shadow-md shadow-indigo-200 transition">
                Simpan Perubahan
            </button>
        </div>

    </div>
</div>

<!-- ============ TOAST NOTIFICATION ============ -->
<div id="toast" class="fixed bottom-5 right-5 z-50 transform transition-all duration-300 translate-y-20 opacity-0 pointer-events-none flex items-center gap-3 px-4 py-3 rounded-xl shadow-lg border">
    <div id="toastIcon" class="w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0"></div>
    <p id="toastMessage" class="text-sm font-medium"></p>
</div>

<!-- Script -->
<script src="JS/Pesanan.js"></script>
</body>
</html>
